<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Forest</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGO -->
    <div class="logo-container">
        <img
            src="fantasy-forest.png"
            alt="Fantasy Forest"
            class="logo-title">
    </div>

    <!-- CONNEXION -->
    <div class="auth-box">

        <h2>🌲 Fantasy Forest</h2>

        <p class="subtitle">
            Bienvenue aventurier !
        </p>

        <div class="auth-form">

            <input
                id="username"
                type="text"
                placeholder="Pseudo">

            <input
                id="password"
                type="password"
                placeholder="Mot de passe">

        </div>

        <div class="auth-buttons">

            <button
                class="register-btn"
                onclick="register()">
                Inscription
            </button>

            <button
                class="login-btn"
                onclick="login()">
                Connexion
            </button>

        </div>

        <p id="loginStatus"></p>

    </div>

    <!-- ROULETTE -->
    <div class="roulette">

        <div class="cursor"></div>

        <div
            id="cards"
            class="cards">
        </div>

    </div>

    <!-- BOUTONS -->
    <div class="buttons-container">

        <button
            class="launch-btn"
            onclick="startRoll()">
            🎲 LANCER
        </button>

        <button
            class="music-btn"
            onclick="toggleMusic()">
            🔊 MUSIQUE
        </button>

    </div>

    <!-- RESULTAT -->
    <h2 id="result"></h2>

    <!-- CARTE GAGNÉE -->
    <div id="winnerContainer">

        <img
            id="winnerCard"
            src=""
            alt="Carte gagnée">

    </div>

    <!-- INVENTAIRE -->
    <section class="inventory-section">

        <h2>🎒 Inventaire</h2>

        <div id="inventory"></div>

    </section>

    <!-- LEADERBOARD -->
    <section class="leaderboard-section">

        <h2>🏆 Leaderboard des Drops</h2>

        <div id="leaderboard"></div>

    </section>

    <!-- MUSIQUE -->
    <audio id="music" loop>
        <source src="foret.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
